---
version: 2

logging:
  prod: true
  log_level: info

directory:
  # This is the embedded local directory DB file.
  db_path: /db/flowpilot.db

api:
  health:
    listen_address: "0.0.0.0:9494"

  services:
    console:
      grpc:
        listen_address: "0.0.0.0:8081"
      gateway:
        listen_address: "0.0.0.0:8080"
        allowed_origins:
          - "*"
        http: true
        read_timeout: 2s
        read_header_timeout: 2s
        write_timeout: 2s
        idle_timeout: 30s

    authorizer:
      grpc:
        listen_address: "0.0.0.0:8282"
      gateway:
        listen_address: "0.0.0.0:8383"
        allowed_origins:
          - "*"
        http: true
        read_timeout: 2s
        read_header_timeout: 2s
        write_timeout: 2s
        idle_timeout: 30s

    # Directory services (model/reader/writer) share one REST gateway in the common reference config.
    model:
      grpc:
        listen_address: "0.0.0.0:9292"
      gateway:
        listen_address: "0.0.0.0:9393"
        allowed_origins:
          - "*"
        http: true
        read_timeout: 2s
        read_header_timeout: 2s
        write_timeout: 2s
        idle_timeout: 30s

    reader:
      grpc:
        listen_address: "0.0.0.0:9292"
      gateway:
        listen_address: "0.0.0.0:9393"
        allowed_origins:
          - "*"
        http: true
        read_timeout: 2s
        read_header_timeout: 2s
        write_timeout: 2s
        idle_timeout: 30s

    writer:
      grpc:
        listen_address: "0.0.0.0:9292"
      gateway:
        listen_address: "0.0.0.0:9393"
        allowed_origins:
          - "*"
        http: true
        read_timeout: 2s
        read_header_timeout: 2s
        write_timeout: 2s
        idle_timeout: 30s
# OPA configuration - minimal setup required by ***REMOVED***
# ABAC policy loading disabled pending ***REMOVED*** community guidance
# See: infra/***REMOVED***/cfg/bundle/ for ready-to-use policy bundle
opa:
  instance_id: "-"
  graceful_shutdown_period_seconds: 2
  # Uncomment below to enable ABAC policy bundle loading:
  # config:
  #   services:
  #     bundle_server:
  #       url: http://host.docker.internal:8888
  #   bundles:
