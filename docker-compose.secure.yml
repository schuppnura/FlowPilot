# Secure development configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.secure.yml up -d
#
# This adds additional security for development:
# - Services only accessible via reverse proxy or internal Docker network
# - Only Keycloak and gateway exposed to host

services:
  # Only expose essential ports
  keycloak:
    ports:
      - "8443:8443"
  
  # Internal services - no direct host access
  flowpilot-authz-api:
    ports: []
  
  flowpilot-ai-agent-api:
    ports: []
  
  flowpilot-services-api:
    ports: []
  
  ***REMOVED***:
    ports: []

# Add a simple reverse proxy for development
  nginx-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flowpilot-authz-api
      - flowpilot-services-api
      - flowpilot-ai-agent-api
