openapi: 3.0.3
info:
  title: FlowPilot AuthZ API
  version: "1.0.0"
  description: >
    Authorization service with PDP façade, PIP enrichment, and ***REMOVED*** adapter.
    Implements AuthZEN-like request structure with progressive profiling support.
    
    **Security**: All endpoints (except /health) require bearer token authentication.
    
    **TLS**: Services use HTTP within the Docker network. For production, deploy behind
    a TLS-terminating reverse proxy (nginx, Traefik, etc.).
servers:
  - url: http://127.0.0.1:8002
    description: Local development access
  - url: http://flowpilot-authz-api:8002
    description: Docker network (internal)
security:
  - BearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []  # No authentication required for health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok

  /v1/evaluate:
    post:
      summary: Evaluate authorization decision (AuthZEN-like)
      security:
        - BearerAuth: []
      description: >
        Evaluates whether a subject (agent or user) may perform an action on a resource.
        Uses AuthZEN-like structure with subject/action/resource/context/options.
        May consult ***REMOVED*** and return advice (e.g., missing profile fields for progressive profiling).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
            examples:
              canExecuteItem:
                value:
                  subject:
                    type: agent
                    id: agent_flowpilot_1
                  action:
                    name: book
                    properties: {}
                  resource:
                    type: workflow_item
                    id: i_f032d0a2
                    properties:
                      workflow_id: t_4a6455a3
                      domain: flowpilot
                  context:
                    principal:
                      id: 1460e175-74f9-43af-aac3-7b4fc0547f05
                    attributes: {}
                  options:
                    dry_run: true
                    explain: true
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
              examples:
                deny:
                  value:
                    decision: deny
                    reason_codes: [***REMOVED***.deny]
                    advice:
                      - type: deny
                        message: "Denied by ***REMOVED*** policy."
                allow:
                  value:
                    decision: allow
                    reason_codes: []
                    advice: []
        "400":
          description: Bad request / downstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}:
    get:
      summary: Get combined profile (policy parameters + identity presence)
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Principal subject UUID
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}/policy-parameters:
    get:
      summary: Get policy parameters (non-PII preferences)
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Policy parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyParametersResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update policy parameters
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPolicyParametersRequest"
      responses:
        "200":
          description: Updated parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyParametersResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}/identity-presence:
    get:
      summary: Get identity presence flags (no PII values)
      description: Returns boolean flags indicating which identity fields are present
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Identity presence flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPresenceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update identity presence flags
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchIdentityPresenceRequest"
      responses:
        "200":
          description: Updated presence flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPresenceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        profiles_in_memory:
          type: integer
      required: [status, service, profiles_in_memory]

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    Advice:
      type: object
      properties:
        type:
          type: string
          description: Advice category (deny, error, info, profile_missing)
        message:
          type: string
      required: [type, message]

    # AuthZEN-like models
    Subject:
      type: object
      description: Actor performing the action (agent or user)
      properties:
        type:
          type: string
          description: Actor type (agent, user)
          example: agent
        id:
          type: string
          description: Actor identifier (agent_sub or user_sub)
          example: agent_flowpilot_1
      required: [type, id]
      additionalProperties: true

    Action:
      type: object
      description: Action being performed
      properties:
        name:
          type: string
          description: Action name (book, execute, approve, etc.)
          example: book
        properties:
          type: object
          description: Action-specific properties
          additionalProperties: true
      required: [name]
      additionalProperties: true

    Resource:
      type: object
      description: Resource being acted upon
      properties:
        type:
          type: string
          description: Resource type (workflow, workflow_item, etc.)
          example: workflow_item
        id:
          type: string
          description: Resource identifier
          example: i_f032d0a2
        properties:
          type: object
          description: Resource-specific properties (workflow_id, domain, etc.)
          additionalProperties: true
      required: [type, id]
      additionalProperties: true

    Context:
      type: object
      description: Request context including principal
      properties:
        principal:
          type: object
          description: Principal on whose behalf action is performed
          properties:
            id:
              type: string
              description: Principal subject UUID
              example: 1460e175-74f9-43af-aac3-7b4fc0547f05
          additionalProperties: true
        attributes:
          type: object
          description: Additional context attributes
          additionalProperties: true
      additionalProperties: true

    Options:
      type: object
      description: Evaluation options
      properties:
        dry_run:
          type: boolean
          description: If true, simulate without side effects
          default: true
        explain:
          type: boolean
          description: If true, include debug traces
          default: true
        trace:
          type: boolean
          description: Override ***REMOVED*** trace behavior
      additionalProperties: true

    EvaluateRequest:
      type: object
      properties:
        subject:
          $ref: "#/components/schemas/Subject"
        action:
          $ref: "#/components/schemas/Action"
        resource:
          $ref: "#/components/schemas/Resource"
        context:
          $ref: "#/components/schemas/Context"
        options:
          $ref: "#/components/schemas/Options"
      required: [subject, action, resource]
      additionalProperties: true

    EvaluateResponse:
      type: object
      properties:
        decision:
          type: string
          description: allow or deny
          enum: [allow, deny]
        reason_codes:
          type: array
          items:
            type: string
          description: Machine-readable reason codes
        advice:
          type: array
          items:
            $ref: "#/components/schemas/Advice"
          description: Human-readable advice and progressive profiling hints
      required: [decision, reason_codes, advice]

    # Profile management models
    ProfileResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        policy_parameters:
          type: object
          description: Non-PII preferences
          additionalProperties: true
        identity_presence:
          type: object
          description: Presence flags for identity fields
          additionalProperties:
            type: boolean
      required: [principal_sub, policy_parameters, identity_presence]

    PolicyParametersResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        parameters:
          type: object
          description: Policy parameters (preferences, non-PII)
          additionalProperties: true
      required: [principal_sub, parameters]

    PatchPolicyParametersRequest:
      type: object
      properties:
        parameters:
          type: object
          description: Parameters to update
          additionalProperties: true
      required: [parameters]

    IdentityPresenceResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        presence:
          type: object
          description: Presence flags (e.g., full_name, phone_number, passport_number)
          additionalProperties:
            type: boolean
      required: [principal_sub, presence]

    PatchIdentityPresenceRequest:
      type: object
      properties:
        presence:
          type: object
          description: Presence flags to update
          additionalProperties:
            type: boolean
      required: [presence]

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer token obtained from Keycloak.
        Service-to-service calls use client credentials grant.
        
        Example: `Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...`
