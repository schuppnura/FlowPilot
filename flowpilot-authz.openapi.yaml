openapi: 3.0.3
info:
  title: FlowPilot AuthZ API
  version: "1.0.0"
  description: >
    Authorization integration service that acts as a Policy Decision Point (PDP) façade
    for OPA policy evaluation. This service integrates Policy Information Points (PIPs)
    to enrich authorization requests with delegation data and user attributes.
    
    **Core Functionality**:
    - Evaluates authorization requests using OPA Rego policies (see `auto_book.rego` policy)
    - Fetches delegation data from delegation-api (PIP)
    - Fetches user attributes from Keycloak via profile.py (PIP)
    - Normalizes and coerces input data before policy evaluation
    - Returns allow/deny decisions with reason codes and advice
    
    **Policy**: The service uses the `auto_book` OPA policy package, which implements
    Attribute-Based Access Control (ABAC) with multi-gate authorization checks including
    anti-spoofing, delegation validation, consent checks, cost limits, advance notice,
    and risk thresholds. See README.md for detailed policy documentation.
    
    Implements AuthZEN-like request structure. The principal (actual user) is identified
    via `context.principal.id`, while `subject.id` represents the agent/service making
    the call.
    
    **Security**: All endpoints (except /health) require bearer token authentication.
    
    **TLS**: Services use HTTP within the Docker network. For production, deploy behind
    a TLS-terminating reverse proxy (nginx, Traefik, etc.).
servers:
  - url: http://127.0.0.1:8002
    description: Local development access
  - url: http://flowpilot-authz-api:8002
    description: Docker network (internal)
security:
  - BearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []  # No authentication required for health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok

  /v1/evaluate:
    post:
      summary: Evaluate authorization decision (AuthZEN-like)
      security:
        - BearerAuth: []
      description: >
        Evaluates whether a subject (agent or user) may perform an action on a resource.
        Uses AuthZEN-like structure with subject/action/resource/context/options.
        
        **Policy Evaluation**:
        
        This endpoint evaluates requests using the OPA `auto_book` policy, which implements
        Attribute-Based Access Control (ABAC) with multi-gate authorization checks.
        
        **Authorization Gates** (all must pass):
        1. **Anti-Spoofing & Delegation**: Principal must be the owner (with matching persona) OR have valid delegation (with "travel-agent" persona)
        2. **Consent**: User must have consented to auto-booking
        3. **Cost Limit**: Trip cost must not exceed user's maximum price limit
        4. **Advance Notice**: Departure must be at least `autobook_leadtime` days in the future
        5. **Risk Threshold**: Airline risk score must not exceed user's risk threshold
        
        **Principal Identification**:
        - The principal (actual user) is extracted from `context.principal.id` (not `subject.id` which is the agent/service)
        - Owner information is extracted from `resource.properties.owner` (set by domain-services-api when workflow was created)
        - Delegation data is fetched from delegation-api (PIP - Policy Information Point)
        
        **Input Normalization**:
        All input data is normalized before policy evaluation:
        - Dates are converted to RFC3339 format (e.g., `2026-01-16T00:00:00Z`)
        - Boolean values are coerced from "Yes"/"No" strings
        - Numeric values are coerced from strings
        
        **Decision Response**:
        - `decision`: "allow" or "deny"
        - `reason_codes`: Array of machine-readable reason codes (see below) when denied
        - `advice`: Array of human-readable advice messages
        
        **Reason Codes** (returned when `decision` is "deny"):
        
        | Code | Description |
        |------|-------------|
        | `auto_book.not_delegated` | Travel agent tried to access a trip without delegation |
        | `auto_book.principal_spoofing` | Non-travel-agent principal tried to access without being owner or having delegation |
        | `auto_book.principal_missing` | Principal persona is not set/undefined (backward compatibility) |
        | `auto_book.persona_mismatch` | Owner's selected persona doesn't match the persona used when creating the workflow |
        | `auto_book.delegation_requires_travel_agent_persona` | Delegated execution requires "travel-agent" persona but different persona was selected |
        | `auto_book.no_consent` | User has not consented to auto-booking |
        | `auto_book.cost_limit_exceeded` | Trip cost exceeds user's maximum price limit |
        | `auto_book.insufficient_advance_notice` | Departure date is too soon (less than required lead time) |
        | `auto_book.airline_risk_too_high` | Airline risk score exceeds user's risk threshold |
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
            examples:
              canExecuteItem:
                value:
                  subject:
                    type: agent
                    id: agent_flowpilot_1
                  action:
                    name: book
                    properties: {}
                  resource:
                    type: workflow_item
                    id: i_f032d0a2
                    properties:
                      workflow_id: t_4a6455a3
                      domain: flowpilot
                  context:
                    principal:
                      id: 1460e175-74f9-43af-aac3-7b4fc0547f05
                    attributes: {}
                  options:
                    dry_run: true
                    explain: true
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
              examples:
                deny:
                  value:
                    decision: deny
                    reason_codes: [auto_book.not_delegated]
                    advice:
                      - type: deny
                        message: "Travel agent not delegated to access this trip"
                allow:
                  value:
                    decision: allow
                    reason_codes: []
                    advice: []
        "400":
          description: Bad request / downstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}:
    get:
      summary: Get combined profile (policy parameters + identity presence)
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Principal subject UUID
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}/policy-parameters:
    get:
      summary: Get policy parameters (non-PII preferences)
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Policy parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyParametersResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update policy parameters
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPolicyParametersRequest"
      responses:
        "200":
          description: Updated parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyParametersResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/profiles/{principal_sub}/identity-presence:
    get:
      summary: Get identity presence flags (no PII values)
      description: Returns boolean flags indicating which identity fields are present
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Identity presence flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPresenceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update identity presence flags
      parameters:
        - name: principal_sub
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchIdentityPresenceRequest"
      responses:
        "200":
          description: Updated presence flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPresenceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/graph/workflows:
    post:
      summary: Create workflow graph (object + owner relation)
      description: >
        Creates a workflow object and establishes the owner relation to a user.
        This endpoint is called by domain services when workflows are created.
        
        **Graph structure**: `workflow --owner--> user`
        
        **Use case**: Domain services call this when creating workflows to establish
        the ownership relation needed for ReBAC authorization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowGraphRequest"
            examples:
              createWorkflow:
                value:
                  workflow_id: t_4a6455a3
                  owner_sub: 1460e175-74f9-43af-aac3-7b4fc0547f05
                  display_name: Paris Weekend Trip
                  properties:
                    domain: flowpilot
                    template_id: paris-weekend
      responses:
        "200":
          description: Workflow graph created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphCreateResponse"
              examples:
                success:
                  value:
                    workflow_id: t_4a6455a3
                    owner_sub: 1460e175-74f9-43af-aac3-7b4fc0547f05
                    status: created
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create objects/relations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/graph/workflow-items:
    post:
      summary: Create workflow item graph (object + workflow relation)
      description: >
        Creates a workflow_item object and links it to a workflow.
        This endpoint is called by domain services for each workflow item.
        
        **Graph structure**: `workflow_item --workflow--> workflow`
        
        **Use case**: Domain services call this when creating workflow items to link
        them to their parent workflow for permission inheritance.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowItemGraphRequest"
            examples:
              createWorkflowItem:
                value:
                  workflow_workflow_item_id: i_f032d0a2
                  workflow_id: t_4a6455a3
                  display_name: Book flight to Paris
                  properties:
                    kind: flight
                    title: CDG-ORY roundtrip
      responses:
        "200":
          description: Workflow item graph created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphCreateResponse"
              examples:
                success:
                  value:
                    workflow_workflow_item_id: i_f032d0a2
                    workflow_id: t_4a6455a3
                    status: created
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create objects/relations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        profiles_in_memory:
          type: integer
      required: [status, service, profiles_in_memory]

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    Advice:
      type: object
      properties:
        type:
          type: string
          description: Advice category (deny, error, info, profile_missing)
        message:
          type: string
      required: [type, message]

    # AuthZEN-like models
    Subject:
      type: object
      description: Actor performing the action (agent or user)
      properties:
        type:
          type: string
          description: Actor type (agent, user)
          example: agent
        id:
          type: string
          description: Actor identifier (agent_sub or user_sub)
          example: agent_flowpilot_1
      required: [type, id]
      additionalProperties: true

    Action:
      type: object
      description: Action being performed
      properties:
        name:
          type: string
          description: Action name (book, execute, approve, etc.)
          example: book
        properties:
          type: object
          description: Action-specific properties
          additionalProperties: true
      required: [name]
      additionalProperties: true

    Resource:
      type: object
      description: Resource being acted upon
      properties:
        type:
          type: string
          description: Resource type (workflow, workflow_item, etc.)
          example: workflow_item
        id:
          type: string
          description: Resource identifier
          example: i_f032d0a2
        properties:
          type: object
          description: >
            Resource-specific properties. For workflow items, must include:
            - `workflow_id`: Parent workflow identifier (for delegation scope matching)
            - `owner`: Object with `id` (owner subject UUID) and `persona` (owner's persona when workflow was created)
            - `planned_price`: Trip cost (numeric)
            - `departure_date`: Departure date (will be normalized to RFC3339 format)
            - `airline_risk_score`: Airline risk score (numeric, optional)
          additionalProperties: true
          example:
            workflow_id: w_123
            owner:
              id: 1460e175-74f9-43af-aac3-7b4fc0547f05
              persona: traveler
            planned_price: 250
            departure_date: "2026-01-16"
            airline_risk_score: 1
      required: [type, id]
      additionalProperties: true

    Context:
      type: object
      description: Request context including principal
      properties:
        principal:
          type: object
          description: >
            Principal on whose behalf action is performed.
            
            **Important**: The `id` field is used as the principal subject ID for authorization checks.
            This is the actual user ID, not the agent/service ID (which is in `subject.id`).
            
            The `persona` field (if present) is the principal's selected persona and is used for
            persona matching checks in the policy.
          properties:
            id:
              type: string
              description: Principal subject UUID (used for anti-spoofing and delegation checks)
              example: 1460e175-74f9-43af-aac3-7b4fc0547f05
            persona:
              type: string
              description: Principal's selected persona (e.g., "traveler", "travel-agent")
              example: travel-agent
          required:
            - id
          additionalProperties: true
        attributes:
          type: object
          description: Additional context attributes
          additionalProperties: true
      additionalProperties: true

    Options:
      type: object
      description: Evaluation options
      properties:
        dry_run:
          type: boolean
          description: If true, simulate without side effects
          default: true
        explain:
          type: boolean
          description: If true, include debug traces
          default: true
        trace:
          type: boolean
          description: Override trace behavior
      additionalProperties: true

    EvaluateRequest:
      type: object
      properties:
        subject:
          $ref: "#/components/schemas/Subject"
        action:
          $ref: "#/components/schemas/Action"
        resource:
          $ref: "#/components/schemas/Resource"
        context:
          $ref: "#/components/schemas/Context"
        options:
          $ref: "#/components/schemas/Options"
      required: [subject, action, resource]
      additionalProperties: true

    EvaluateResponse:
      type: object
      properties:
        decision:
          type: string
          description: allow or deny
          enum: [allow, deny]
        reason_codes:
          type: array
          items:
            type: string
            enum:
              - auto_book.not_delegated
              - auto_book.principal_spoofing
              - auto_book.principal_missing
              - auto_book.persona_mismatch
              - auto_book.delegation_requires_travel_agent_persona
              - auto_book.no_consent
              - auto_book.cost_limit_exceeded
              - auto_book.insufficient_advance_notice
              - auto_book.airline_risk_too_high
          description: >
            Machine-readable reason codes indicating why authorization was denied.
            Empty array when decision is "allow". See endpoint description for code meanings.
        advice:
          type: array
          items:
            $ref: "#/components/schemas/Advice"
          description: Human-readable advice and progressive profiling hints
      required: [decision, reason_codes, advice]

    # Profile management models
    ProfileResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        policy_parameters:
          type: object
          description: Non-PII preferences
          additionalProperties: true
        identity_presence:
          type: object
          description: Presence flags for identity fields
          additionalProperties:
            type: boolean
      required: [principal_sub, policy_parameters, identity_presence]

    PolicyParametersResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        parameters:
          type: object
          description: Policy parameters (preferences, non-PII)
          additionalProperties: true
      required: [principal_sub, parameters]

    PatchPolicyParametersRequest:
      type: object
      properties:
        parameters:
          type: object
          description: Parameters to update
          additionalProperties: true
      required: [parameters]

    IdentityPresenceResponse:
      type: object
      properties:
        principal_sub:
          type: string
          format: uuid
        presence:
          type: object
          description: Presence flags (e.g., full_name, phone_number, passport_number)
          additionalProperties:
            type: boolean
      required: [principal_sub, presence]

    PatchIdentityPresenceRequest:
      type: object
      properties:
        presence:
          type: object
          description: Presence flags to update
          additionalProperties:
            type: boolean
      required: [presence]

    # Graph write models
    CreateWorkflowGraphRequest:
      type: object
      description: Request to create workflow object and owner relation
      properties:
        workflow_id:
          type: string
          description: Workflow identifier (typically workflow_id)
          example: t_4a6455a3
        owner_sub:
          type: string
          format: uuid
          description: Owner user subject UUID from Keycloak
          example: 1460e175-74f9-43af-aac3-7b4fc0547f05
        display_name:
          type: string
          description: Human-readable workflow name
          example: Paris Weekend Trip
        properties:
          type: object
          description: Optional workflow properties (domain, template_id, etc.)
          additionalProperties: true
      required: [workflow_id, owner_sub]

    CreateWorkflowItemGraphRequest:
      type: object
      description: Request to create workflow_item object and workflow relation
      properties:
        workflow_workflow_item_id:
          type: string
          description: Workflow item identifier
          example: i_f032d0a2
        workflow_id:
          type: string
          description: Parent workflow identifier
          example: t_4a6455a3
        display_name:
          type: string
          description: Human-readable item name
          example: Book flight to Paris
        properties:
          type: object
          description: Optional item properties (kind, title, etc.)
          additionalProperties: true
      required: [workflow_workflow_item_id, workflow_id]

    GraphCreateResponse:
      type: object
      description: Response from graph write operations
      properties:
        workflow_id:
          type: string
          description: Workflow ID (present for workflow creation)
        workflow_workflow_item_id:
          type: string
          description: Workflow item ID (present for item creation)
        owner_sub:
          type: string
          description: Owner subject UUID (present for workflow creation)
        status:
          type: string
          description: Creation status
          enum: [created]
          example: created
      required: [status]

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer token obtained from Keycloak.
        Service-to-service calls use client credentials grant.
        
        Example: `Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...`
