openapi: 3.0.3
info:
  title: FlowPilot Services API
  version: "0.9.0"
servers:
  - url: http://127.0.0.1:8003
    description: Host access (desktop app)
  - url: http://flowpilot-services-api:8000
    description: Docker network access (agent-runner)
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok

  /v1/trip-templates:
    get:
      summary: List workflow templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripTemplatesResponse"
              examples:
                sample:
                  value:
                    templates:
                      - template_id: template_all_ok
                        title: Basic City Trip (all OK)
                        description: A basic template with 3 planned items.
                        item_count: 3
                      - template_id: template_basic
                        title: Basic City Trip (mix allow/deny)
                        description: A template designed to demonstrate mixed outcomes.
                        item_count: 3

  /v1/trips:
    post:
      summary: Create workflow (trip) from a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripRequest"
            examples:
              create:
                value:
                  template_id: template_all_ok
                  principal_sub: 1460e175-74f9-43af-aac3-7b4fc0547f05
      responses:
        "200":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
              examples:
                created:
                  value:
                    trip_id: t_85244fb6
                    template_id: template_all_ok
                    owner_sub: 1460e175-74f9-43af-aac3-7b4fc0547f05
                    created_at: "2025-12-16T15:24:09.068379+00:00"
                    item_count: 3
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/trips/{trip_id}:
    get:
      summary: Get workflow (trip) by id
      parameters:
        - name: trip_id
          in: path
          required: true
          schema:
            type: string
            example: t_85244fb6
      responses:
        "200":
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    detail: "Trip not found: t_..."

  /v1/trips/{trip_id}/itinerary:
    get:
      summary: List workflow items
      parameters:
        - name: trip_id
          in: path
          required: true
          schema:
            type: string
            example: t_85244fb6
      responses:
        "200":
          description: Item list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryResponse"
              examples:
                sample:
                  value:
                    trip_id: t_85244fb6
                    items:
                      - item_id: i_8484ac8f
                        kind: unknown
                        title: unknown
                        status: planned
                      - item_id: i_6aac5389
                        kind: unknown
                        title: unknown
                        status: planned
                      - item_id: i_0c758592
                        kind: unknown
                        title: unknown
                        status: planned
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/trips/{trip_id}/itinerary-items/{item_id}/execute:
    post:
      summary: Execute a single workflow item (PEP)
      parameters:
        - name: trip_id
          in: path
          required: true
          schema:
            type: string
            example: t_85244fb6
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            example: i_8484ac8f
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteItemRequest"
            examples:
              dryRun:
                value:
                  principal_sub: 1460e175-74f9-43af-aac3-7b4fc0547f05
                  dry_run: true
      responses:
        "200":
          description: Executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteItemResponse"
              examples:
                ok:
                  value:
                    trip_id: t_85244fb6
                    item_id: i_8484ac8f
                    dry_run: true
                    result: executed
                    status: completed
        "403":
          description: Denied by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                denied:
                  value:
                    detail: "Access denied by policy decision: decision=deny reason_codes=['***REMOVED***.deny']"
        "400":
          description: Bad request / downstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        templates_loaded:
          type: integer
        trips_in_memory:
          type: integer
      required: [status, service, templates_loaded, trips_in_memory]

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    TripTemplate:
      type: object
      properties:
        template_id:
          type: string
        title:
          type: string
        description:
          type: string
        item_count:
          type: integer
          minimum: 0
      required: [template_id, title, description, item_count]

    TripTemplatesResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/TripTemplate"
      required: [templates]

    CreateTripRequest:
      type: object
      properties:
        template_id:
          type: string
        principal_sub:
          type: string
      required: [template_id, principal_sub]

    Trip:
      type: object
      properties:
        trip_id:
          type: string
        template_id:
          type: string
        owner_sub:
          type: string
        created_at:
          type: string
        item_count:
          type: integer
          minimum: 0
      required: [trip_id, template_id, owner_sub, created_at, item_count]

    ItineraryItem:
      type: object
      properties:
        item_id:
          type: string
        kind:
          type: string
        title:
          type: string
        status:
          type: string
      required: [item_id, kind, title, status]

    ItineraryResponse:
      type: object
      properties:
        trip_id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryItem"
      required: [trip_id, items]

    ExecuteItemRequest:
      type: object
      properties:
        principal_sub:
          type: string
        dry_run:
          type: boolean
      required: [principal_sub, dry_run]

    ExecuteItemResponse:
      type: object
      properties:
        trip_id:
          type: string
        item_id:
          type: string
        dry_run:
          type: boolean
        result:
          type: string
        status:
          type: string
      required: [trip_id, item_id, dry_run, result, status]