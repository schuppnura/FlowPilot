# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  keycloak:
    # Use production start command instead of start-dev
    command: ["start", "--optimized", "--import-realm"]
    environment:
      # Production mode settings
      KC_HTTP_ENABLED: "false"  # Disable HTTP, HTTPS only
      KC_HOSTNAME_STRICT: "true"  # Strict hostname checking
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
      
      # Enable health checks
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      
      # Security headers
      KC_HTTP_HEADERS_CACHE_CONTROL: "no-store"
      KC_HTTP_HEADERS_STRICT_TRANSPORT_SECURITY: "max-age=31536000; includeSubDomains"
      KC_HTTP_HEADERS_X_CONTENT_TYPE_OPTIONS: "nosniff"
      KC_HTTP_HEADERS_X_FRAME_OPTIONS: "DENY"
      KC_HTTP_HEADERS_X_XSS_PROTECTION: "1; mode=block"
    ports:
      # Only expose HTTPS in production
      - "8443:8443"

  flowpilot-authz-api:
    environment:
      KEYCLOAK_VERIFY_SSL: "true"  # Enable SSL verification in production
    # Don't expose directly - use reverse proxy
    ports: []

  flowpilot-ai-agent-api:
    environment:
      KEYCLOAK_VERIFY_SSL: "true"
    ports: []

  flowpilot-services-api:
    environment:
      KEYCLOAK_VERIFY_SSL: "true"
    ports: []

  ***REMOVED***:
    # Don't expose ***REMOVED*** ports directly
    ports: []

# Add internal network for production
networks:
  default:
    driver: bridge
    internal: false  # Set to true if behind reverse proxy
